<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Product Metrics Roadmap Decision Studio</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Product management portfolio artifact</p>
        <h1>Product Metrics Roadmap Decision Studio</h1>
        <p>
          A PM operating studio for prioritizing technology services product bets, shaping PRD-ready backlog work,
          and checking launch measurement before sprint commitment.
        </p>
      </div>
      <div class="hero-panel" id="summaryCards"></div>
    </section>

    <nav class="tabs" aria-label="Product workflow surfaces">
      <button class="tab is-active" data-view="roadmap">Roadmap</button>
      <button class="tab" data-view="discovery">Discovery</button>
      <button class="tab" data-view="delivery">PRD and Agile</button>
      <button class="tab" data-view="launch">Launch</button>
    </nav>

    <section id="app" class="workspace" aria-live="polite"></section>
  </main>
  <script src="src/app.js"></script>
</body>
</html>
